<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page-body">
    <nav class="top-nav"><a href="index.html">INDEX</a></nav>
    
    <div class="contact-container">
        <div class="contact-card">
            <div class="contact-info">
                <div class="profile-area">
                    <img src="broryan.png" class="profile-photo" alt="My Profile">
                </div>
                
                <h2>GET IN TOUCH</h2>
                <p>Have a project in mind? Drop a message below.</p>
                
                <div class="contact-details">
                    <div class="detail-item">
                        <span>EMAIL</span>
                        <p>yourname@example.com</p>
                    </div>
                    <div class="detail-item">
                        <span>LOCATION</span>
                        <p>City, Country</p>
                    </div>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label>NAME</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label>MESSAGE</label>
                    <textarea placeholder="How can I help?" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">SEND MESSAGE</button>
            </form>
        </div>
    </div>
</body>
</html>
